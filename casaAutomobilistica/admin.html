<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pannello Admin</title>
</head>
<body>

    <h1>Pannello di Controllo - Admin</h1>
    <a href="index.html">Torna alla Home</a>
    <br><br>

    <h2>Aggiungi un nuovo elemento a sistema</h2>
    <select id="tipoElemento">
        <option value="servizio">Servizio</option>
        <option value="ricambio">Pezzo di Ricambio</option>
        <option value="accessorio">Accessorio</option>
    </select>
    <br><br>
    <input type="number" id="codiceElemento" placeholder="Codice"><br><br>
    <input type="text" id="descrizioneElemento" placeholder="Descrizione"><br><br>
    <input type="number" id="costoElemento" placeholder="Costo"><br><br>
    <button id="btnAggiungi">Aggiungi</button>


    <h2>Elimina elemento dal sistema</h2>
    <select id="tipoElemento">
        <option value="servizio">Servizio</option>
        <option value="ricambio">Pezzo di Ricambio</option>
        <option value="accessorio">Accessorio</option>
    </select>
    <br><br>
    <input type="number" id="codiceElemento" placeholder="Codice"><br><br>
    <button id="btnRimuovi">Rimuovi</button>


<hr>
    <br>
    <h2>Associa Elementi alle Officine</h2>
    <p>Collega un servizio, accessorio o ricambio a una specifica officina.</p>

    <select id="tipoAssociazione" onchange="gestisciQuantita()">
        <option value="servizio">Associa Servizio</option>
        <option value="ricambio">Associa Pezzo di Ricambio</option>
        <option value="accessorio">Associa Accessorio</option>
    </select>
    <br><br>

    <input type="number" id="codiceOff" placeholder="Codice Officina (es. 1)"><br><br>
    
    <input type="number" id="codiceElemAssocia" placeholder="Codice Elemento (es. 101)"><br><br>
    
    <input type="number" id="quantitaElem" placeholder="Quantità (Lascia vuoto per Servizi)"><br><br>

    <button id="btnAssocia">Crea Associazione</button>

    <script src="js/admin.js"></script>
</body>
</html>
